name: Lockfile Check

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  verify-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Check if uv.lock is in sync
        run: uv lock --check